name: Publish to Hugging Face

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      model:
        description: Model to publish (leave empty to publish all)
        required: false
        type: string
      version:
        description: Version tag
        required: true
        type: string
      org:
        description: Organization
        required: false
        default: Cactus-Compute
        type: string
      bits:
        description: CQ quantization bits (e.g. "4" or "3 4")
        required: false
        type: string
        default: "4"
      pipeline_tag:
        description: Pipeline tag (e.g. text-generation)
        required: false
        type: string
      tags:
        description: Comma-separated tags (e.g. completion,tools)
        required: false
        type: string
      description:
        description: Model description
        required: false
        type: string
      branch:
        description: Branch override (uses version tag if empty)
        required: false
        type: string

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || steps.version.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Publish models
        run: |
          cd python
          ORG="${{ github.event.inputs.org || 'Cactus-Compute' }}"
          VERSION="${{ steps.version.outputs.tag }}"
          BITS="${{ github.event.inputs.bits || '4' }}"

          publish_model() {
            local model=$1; shift
            local bits=$1; shift
            local pipeline_tag=$1; shift
            local tags=$1; shift
            local description="${1:-}"
            local FLAGS=(--version "$VERSION" --org "$ORG" --model "$model" --bits $bits)
            [ -n "$pipeline_tag" ] && FLAGS+=(--pipeline-tag "$pipeline_tag")
            [ -n "$tags" ] && FLAGS+=(--tags "$tags")
            python -m cactus.cli.publish_to_hf "${FLAGS[@]}" --description "$description"
          }

          if [ -n "${{ github.event.inputs.model }}" ]; then
            publish_model \
              "${{ github.event.inputs.model }}" \
              "$BITS" \
              "${{ github.event.inputs.pipeline_tag }}" \
              "${{ github.event.inputs.tags }}" \
              "${{ github.event.inputs.description }}"
          else
            FAILED_MODELS=()
            while read -r config; do
              model=$(echo "$config" | jq -r '.model')
              bits=$(echo "$config" | jq -r 'if .bits | type == "array" then .bits | map(tostring) | join(" ") else (.bits // 4 | tostring) end')
              pipeline_tag=$(echo "$config" | jq -r '.pipeline_tag // ""')
              tags=$(echo "$config" | jq -r 'if .tags then .tags | join(",") else "" end')
              description=$(echo "$config" | jq -r '.description // ""')
              if ! publish_model "$model" "$bits" "$pipeline_tag" "$tags" "$description"; then
                echo "::error::Failed to publish $model"
                FAILED_MODELS+=("$model")
              fi
            done < <(jq -c '.[]' "$GITHUB_WORKSPACE/models.json")

            if [ ${#FAILED_MODELS[@]} -gt 0 ]; then
              echo "::error::Failed models: ${FAILED_MODELS[*]}"
              exit 1
            fi
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: "1"
