name: PyPI Publish

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 2.0.0). Leave empty to read from CACTUS_VERSION."
        required: false
        type: string

permissions:
  contents: read

jobs:
  wheels-macos:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: ./.github/actions/stamp-version

      - name: Build native library
        run: |
          pip install -e python/
          cactus build
          mkdir -p python/cactus/bindings/lib
          cp cactus-engine/build/libcactus_engine.dylib python/cactus/bindings/lib/

      - name: Build and repair wheel
        working-directory: python
        run: |
          pip install build delocate
          python -m build --wheel -C="--build-option=--plat-name=macosx_14_0_arm64"
          delocate-wheel --require-archs arm64 -w wheelhouse -v dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: python/wheelhouse/*.whl

  wheels-linux:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    container:
      image: quay.io/pypa/manylinux_2_28_aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Provision toolchain
        run: |
          dnf install -y libcurl-devel openssl-devel
          echo "/opt/python/cp312-cp312/bin" >> "$GITHUB_PATH"

      - uses: ./.github/actions/stamp-version

      - name: Build native library
        run: |
          pip install -e python/
          cactus build
          mkdir -p python/cactus/bindings/lib
          cp cactus-engine/build/libcactus_engine.so python/cactus/bindings/lib/

      - name: Build and repair wheel
        working-directory: python
        run: |
          pip install build auditwheel
          python -m build --wheel -C="--build-option=--plat-name=linux_aarch64"
          auditwheel repair dist/*.whl -w wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-aarch64
          path: python/wheelhouse/*.whl

  sdist:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: ./.github/actions/stamp-version

      - name: Build sdist
        working-directory: python
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  publish:
    needs: [wheels-macos, wheels-linux, sdist]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          attestations: false
