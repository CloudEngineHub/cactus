name: Release

on:
  release:
    types: [published]

jobs:
  pypi:
    uses: ./.github/workflows/pypi.yml

  homebrew:
    needs: pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Homebrew formula
        env:
          TAG: ${{ github.event.release.tag_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          python3 - <<'SCRIPT'
          import hashlib, os, pathlib, subprocess, time, urllib.request

          tag = os.environ["TAG"]
          token = os.environ["HOMEBREW_TAP_TOKEN"]
          version = tag.lstrip("v") + ".0"
          url = f"https://files.pythonhosted.org/packages/source/c/cactus-compute/cactus_compute-{version}.tar.gz"

          for attempt in range(5):
              try:
                  data = urllib.request.urlopen(url, timeout=30).read()
                  sha = hashlib.sha256(data).hexdigest()
                  break
              except Exception:
                  print(f"Waiting for PyPI CDN (attempt {attempt + 1})...")
                  time.sleep(15)
          else:
              raise RuntimeError(f"Package not available at {url}")

          formula = f'''class Cactus < Formula
            include Language::Python::Virtualenv
            desc "On-device AI inference"
            homepage "https://cactuscompute.com"
            url "{url}"
            sha256 "{sha}"
            license "Cactus Compute License"
            depends_on "python@3.12"
            def install
              virtualenv_install_with_resources
            end
            test do
              system bin/"cactus", "--help"
            end
          end
          '''

          subprocess.run(["git", "clone", f"https://x-access-token:{token}@github.com/cactus-compute/homebrew-cactus.git", "tap"], check=True)
          os.chdir("tap")
          pathlib.Path("Formula/cactus.rb").write_text(formula)
          subprocess.run(["git", "config", "user.name", "github-actions[bot]"], check=True)
          subprocess.run(["git", "config", "user.email", "github-actions[bot]@users.noreply.github.com"], check=True)
          subprocess.run(["git", "add", "Formula/cactus.rb"], check=True)
          subprocess.run(["git", "commit", "-m", f"Update cactus to {tag}"], check=True)
          subprocess.run(["git", "push", "origin", "main"], check=True)
          SCRIPT

  docs:
    permissions:
      contents: write
    uses: ./.github/workflows/docs.yml
    with:
      version: ${{ github.event.release.tag_name }}
